[variables]
PHP_VERSION = "8.2"

[php]
extensions = [
    "mysqli",
    "json", 
    "mbstring",
    "gd",
    "pdo",
    "pdo_mysql",
    "curl",
    "zip",
    "xml",
    "bcmath",
    "intl"
]
ini = """
upload_max_filesize = 50M
post_max_size = 50M
max_execution_time = 300
memory_limit = 256M
date.timezone = Europe/Madrid
display_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
session.save_handler = files
session.save_path = /tmp/sessions
"""

[deploy]
webdirectory = "webemios"
