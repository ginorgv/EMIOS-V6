[www]
user = www-data
group = www-data
listen = /tmp/php-fpm.sock
listen.mode = 0666
listen.owner = www-data
listen.group = www-data
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 5
pm.max_requests = 500
catch_workers_output = yes
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /dev/stderr

