events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50M;

    # Railway proporciona la IP real a través de headers
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;

    # Mejorar el formato de logs para Railway
    log_format railway '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for"';

    server {
        listen 80;
        server_name _;

        # Raíz del documento: webemios/
        root /var/www/html/webemios;
        index index.php index.html;

        # Logs a stdout/stderr para Railway
        access_log /dev/stdout railway;
        error_log /dev/stderr;

        # ============================================
        # Reescribir rutas de la aplicación
        # Los entry points están en comun/ pero se 
        # accede como si estuvieran en la raíz
        # ============================================
        rewrite ^/login\.php$  /comun/login.php last;
        rewrite ^/logout\.php$ /comun/src/login/logout.php last;
        rewrite ^/index\.php$  /comun/index.php last;

        # ============================================
        # Archivos estáticos (con caché)
        # ============================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|json|xml|map)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ============================================
        # Archivos PHP en rutas estándar (comun, src, api, etc.)
        # ============================================
        location ~ \.php$ {
            # Si el archivo no existe directamente, pasar al router
            if (!-f $request_filename) {
                rewrite ^ /router.php last;
            }

            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            include fastcgi_params;

            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
            fastcgi_read_timeout 300;
        }

        # ============================================
        # Router principal - todas las demás rutas
        # ============================================
        location / {
            try_files $uri $uri/ /router.php?$query_string;
        }

        # ============================================
        # Seguridad
        # ============================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ^/(rsc/config|tmp|scripts|documentacion) {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
